# Microbiome Simulation System - Conda Environment
# 
# Create environment: conda env create -f environment.yml
# Activate: conda activate microbiome-sim
# Update: conda env update -f environment.yml
#
# For GPU support, modify the pytorch line to include cudatoolkit:
#   - pytorch::pytorch=2.0.*=*cuda*
#   - pytorch::pytorch-cuda=11.8

name: microbiome-sim

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.9,<3.13
  
  # Core scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  
  # PyTorch (CPU version - see comments above for GPU)
  - pytorch::pytorch>=2.0
  
  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  
  # Configuration
  - pyyaml>=6.0
  
  # Progress bars
  - tqdm>=4.65
  
  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1
  
  # Pip dependencies (not available in conda)
  - pip
  - pip:
    - hypothesis>=6.82.0
    - jsonschema>=4.17.0
