# Publication Pipeline Configuration Template
# 
# This file provides a template for configuring the publication pipeline.
# Copy this file and modify the settings according to your needs.
#
# Usage:
#   1. Copy this file: cp configs/publication_config_template.yaml my_config.yaml
#   2. Edit the settings below
#   3. Run pipeline: python -m src.publication_pipeline --config my_config.yaml

# Core Settings
output_dir: "publication_outputs"
project_name: "Microbiome Simulation Study"

# Analysis Options
include_biological_validation: true
include_statistical_tests: true
include_benchmarking: false

# Output Formats
figure_formats:
  - "pdf"
  - "png"
  # - "svg"  # Uncomment for SVG output

# Metrics Configuration
# Leave metrics_to_include as null to include all metrics
# Or specify a list of metrics to include only those
metrics_to_include: null
# metrics_to_include:
#   - "mfd"
#   - "mae"
#   - "top_5_acc"
#   - "top_10_acc"

k_values:
  - 5
  - 10
  - 20

# Statistical Settings
confidence_level: 0.95
multiple_comparison_correction: "bonferroni"  # Options: bonferroni, holm, fdr_bh

# Figure Settings
figure_settings:
  dpi: 300
  font_size: 10
  figsize_single: [4.5, 3.5]
  figsize_double: [9.0, 3.5]
  style: "seaborn-v0_8-paper"  # Matplotlib style
  output_format: "pdf"  # Primary format

# Table Settings
table_settings:
  precision: 3
  use_booktabs: true
  caption_position: "top"
  font_size: "small"

# Validation Settings
validation_settings:
  check_composition_sums: true
  check_non_negative: true
  tolerance: 1e-3

# Advanced Settings (Optional)

# Custom color schemes for figures
# color_scheme:
#   primary: "#2E86AB"
#   secondary: "#A23B72"
#   tertiary: "#F18F01"

# Method-specific settings
# method_settings:
#   "Method_1":
#     color: "#2E86AB"
#     label: "Our Method"
#   "Method_2":
#     color: "#A23B72"
#     label: "Baseline VAE"

