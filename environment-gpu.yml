# Microbiome Simulation System - Conda Environment (GPU)
# 
# Create environment: conda env create -f environment-gpu.yml
# Activate: conda activate microbiome-sim-gpu
# Update: conda env update -f environment-gpu.yml
#
# This environment includes CUDA support for GPU acceleration.
# Requires NVIDIA GPU with CUDA support.

name: microbiome-sim-gpu

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.9,<3.13
  
  # Core scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  
  # PyTorch with CUDA support
  - pytorch::pytorch>=2.0
  - pytorch::pytorch-cuda=11.8
  
  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  
  # Configuration
  - pyyaml>=6.0
  
  # Progress bars
  - tqdm>=4.65
  
  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1
  
  # Pip dependencies (not available in conda)
  - pip
  - pip:
    - hypothesis>=6.82.0
    - jsonschema>=4.17.0
